    function triggerImport() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'application/json,.json';
      input.addEventListener('change', function () {
        const file = input.files && input.files[0];
        if (!file) return;
        importDataFromFile(file, function (ok) {
          if (ok) renderAll();
        });
      });
      input.click();
    }

    // ============================================================
    // Play screen rendering
    // ============================================================
    function renderPlay() {
      const root = document.getElementById('screen-play');
      root.innerHTML = '';
      const round = state.activeRound;
      if (!round) {
        const empty = el('div', { class: 'empty-state padded' }, [
          'Es laeuft keine Runde. Wechsle zu Setup, um eine Runde zu starten.'
        ]);
        root.appendChild(empty);
        return;
      }
      const course = getCourseForRound(round);

      // Banner for saved/finished rounds (read-only mode)
      if (round.status === 'finished') {
        root.appendChild(el('div', { class: 'history-banner' }, [
          'Gespeicherte Runde · ', el('strong', {}, [course.name]),
          ' · ', formatDate(round.date)
        ]));
      }

      // Header (status + segment)
      const header = el('div', { class: 'play-header' });
      const status = el('div', { class: 'status-line' });
      status.appendChild(el('span', { class: 'nowrap' }, [course.name]));
      status.appendChild(el('span', { class: 'nowrap' }, [formatDate(round.date)]));
      header.appendChild(status);

      // Autosave indicator only for drafts
      if (round.status === 'draft') {
        const hint = el('div', {
          id: 'autosave-hint',
          class: 'small',
          style: 'font-size:10px; color:#5A5A5A; margin-top:-2px;'
        }, [
          __lastAutosaveAt
            ? ('Automatisch gespeichert · ' + formatTime(__lastAutosaveAt))
            : 'Automatisch lokal gespeichert'
        ]);
        header.appendChild(hint);
      }
      const segWrap = el('div');
      const seg = el('div', { class: 'segment', role: 'tablist' });
      const segLive = el('button', {
        class: state.segment === 'live' ? 'is-active' : '',
        type: 'button', role: 'tab',
        'aria-selected': state.segment === 'live' ? 'true' : 'false'
      }, ['Live']);
      const segCard = el('button', {
        class: state.segment === 'card' ? 'is-active' : '',
        type: 'button', role: 'tab',
        'aria-selected': state.segment === 'card' ? 'true' : 'false'
      }, ['Karte']);
      segLive.addEventListener('click', function () { setSegment('live'); });
      segCard.addEventListener('click', function () { setSegment('card'); });
      seg.appendChild(segLive);
      seg.appendChild(segCard);
      segWrap.appendChild(seg);
      header.appendChild(segWrap);
      root.appendChild(header);

      // Body
      const body = el('div', { class: 'play-body' });
      const livePane = el('div', { class: 'play-pane' + (state.segment === 'live' ? ' is-active' : '') });
      const cardPane = el('div', { class: 'play-pane card-pane' + (state.segment === 'card' ? ' is-active' : '') });
      renderLivePane(livePane, round, course);
      renderCardPane(cardPane, round, course);
      body.appendChild(livePane);
      body.appendChild(cardPane);
      root.appendChild(body);
    }
    function renderLivePane(pane, round, course) {
      const hole = getHole(course, round.currentHole);
      // Hole header
      const hdr = el('div', { class: 'hole-header' });
      hdr.appendChild(el('div', { class: 'hole-num' }, ['Loch ' + hole.holeNumber]));
      const meta = el('div', { class: 'hole-meta' });
      meta.appendChild(el('span', {}, ['Par ' + hole.par]));
      meta.appendChild(el('span', {}, ['SI ' + hole.strokeIndex]));
      hdr.appendChild(meta);
      pane.appendChild(hdr);

      // Player blocks
      const blocks = el('div', { class: 'player-blocks' });
      round.playersInRound.forEach(function (pir, idx) {
        blocks.appendChild(renderPlayerBlock(round, course, hole, pir, idx));
      });
      pane.appendChild(blocks);

      // Hole nav
      const nav = el('div', { class: 'hole-nav' });
      const prev = el('button', {
        class: 'btn' + (round.currentHole === 1 ? ' is-disabled' : ''),
        type: 'button'
      }, ['‹ Loch ' + Math.max(1, round.currentHole - 1)]);
      if (round.currentHole === 1) prev.disabled = true;
      prev.addEventListener('click', function () {
        if (round.currentHole > 1) {
          round.currentHole--;
          scheduleAutosave();
          renderPlay();
        }
      });
      const nextLabel = round.currentHole === 18 ? 'Runde abschliessen' : ('Loch ' + (round.currentHole + 1) + ' ›');
      const next = el('button', { class: 'btn btn-primary', type: 'button' }, [nextLabel]);
      next.addEventListener('click', function () {
        if (round.currentHole < 18) {
          round.currentHole++;
          scheduleAutosave();
          renderPlay();
        } else {
          openDialog({
            title: 'Runde abschliessen?',
            message: 'Moechtest du die Runde jetzt abschliessen und zur Ergebnisansicht wechseln?',
            confirmText: 'Ja, abschliessen',
            cancelText: 'Nein, weiterspielen',
            onConfirm: function () {
              finishActiveRound();
              setScreen('results');
            }
          });
        }
      });
      nav.appendChild(prev);
      nav.appendChild(next);
      pane.appendChild(nav);
    }
    function renderPlayerBlock(round, course, hole, pir, idx) {
      const block = el('div', { class: 'player-block', 'data-player-idx': String(idx) });
      const given = pir.strokesPerHole[hole.holeNumber - 1] || 0;
      const strokes = getStrokesForPlayerHole(round, idx, hole.holeNumber);
      const totals = computeTotals(round, idx);
      const readOnly = (round.status === 'finished');

      const row1 = el('div', { class: 'pb-row1' });
      row1.appendChild(el('span', { class: 'pb-name' }, [pir.displayName]));
      row1.appendChild(el('span', { class: 'pb-hcp' }, ['(HCP ' + pir.handicapIndexAtRound.toFixed(1) + ', SPH ' + pir.playingHandicap + ')']));
      const slash = slashChars(given);
      if (slash) row1.appendChild(el('span', { class: 'pb-slash', 'aria-label': 'Vorgabeschlaege' }, [slash]));
      block.appendChild(row1);

      const row2 = el('div', { class: 'pb-row2' });
      const minus = el('button', {
        class: 'stroke-btn',
        type: 'button',
        'aria-label': 'Schlag minus'
      }, ['−']);
      if (strokes <= 0 || readOnly) minus.disabled = true;
      minus.addEventListener('click', function () {
        if (readOnly) return;
        let s = strokes;
        if (s <= 0) return;
        s = Math.max(0, s - 1);
        setStrokesForPlayerHole(round, idx, hole.holeNumber, s);
        scheduleAutosave();
        renderPlay();
      });
      const value = el('div', {
        class: 'stroke-value' + (strokes <= 0 ? ' is-empty' : '')
      }, [strokes > 0 ? String(strokes) : '—']);
      const plus = el('button', {
        class: 'stroke-btn',
        type: 'button',
        'aria-label': 'Schlag plus'
      }, ['+']);
      if (strokes >= 15 || readOnly) plus.disabled = true;
      plus.addEventListener('click', function () {
        if (readOnly) return;
        let s = strokes;
        if (s <= 0) {
          s = hole.par;
        } else if (s < 15) {
          s += 1;
        } else {
          return;
        }
        setStrokesForPlayerHole(round, idx, hole.holeNumber, s);
        scheduleAutosave();
        renderPlay();
      });
      row2.appendChild(minus);
      row2.appendChild(value);
      row2.appendChild(plus);
      block.appendChild(row2);

      const row3 = el('div', { class: 'pb-row3' });
      const stbl = strokes > 0 ? stablefordForHole(strokes, hole.par, given) : 0;
      const net = strokes > 0 ? (strokes - given) : 0;
      row3.appendChild(el('span', {}, ['Stbf: ', el('strong', {}, [strokes > 0 ? String(stbl) : '—'])]));
      row3.appendChild(el('span', {}, ['Net: ', el('strong', {}, [strokes > 0 ? String(net) : '—'])]));
      row3.appendChild(el('span', {}, ['Total: ', el('strong', {}, [String(totals.grossTotal)]), totals.anyEntered ? (' (' + formatToPar(totals.toParGross) + ')') : '']));
      row3.appendChild(el('span', {}, ['Stbf-Gesamt: ', el('strong', {}, [String(totals.stablefordTotal)])]));
      block.appendChild(row3);

      return block;
    }
    function renderCardPane(pane, round, course) {
      // Mini header (tournament-style) with print button
      const mini = el('div', { class: 'card-mini-header' });
      const topRow = el('div', { class: 'mini-header-top' });
      topRow.appendChild(el('div', { class: 'course-line' }, [course.name + ' — ' + formatDate(round.date)]));
      const printBtn = el('button', { class: 'print-btn', type: 'button' }, ['Drucken / PDF']);
      printBtn.addEventListener('click', function () { window.print(); });
      topRow.appendChild(printBtn);
      mini.appendChild(topRow);
      const legend = el('div', { class: 'legend' });
      round.playersInRound.forEach(function (pir) {
        const tag = el('span', { class: 'player-tag' });
        tag.appendChild(el('span', { class: 'dot tee-dot-' + pir.teeColorKey }));
        tag.appendChild(document.createTextNode(' ' + shortName(pir.displayName, 14) + ' (' + (TEE_LABELS[pir.teeColorKey] || pir.teeColorKey) + ')'));
        legend.appendChild(tag);
      });
      mini.appendChild(legend);
      pane.appendChild(mini);

      // Scrollable table (paper scorecard layout: holes = rows, players = column blocks)
      const wrap = el('div', { class: 'scorecard-wrap' });
      const nPlayers = round.playersInRound.length;
      // v1.2: denser classes for 4-player mode
      const table = el('table', { class: 'scorecard' + (nPlayers >= 4 ? ' is-4players' : '') });

      // Distance column: pick the dominant tee to display in the left block.
      // Prefer yellow (classical men's tee), fallback to any tee that actually has yardages.
      let domTee = getTee(course, 'yellow');
      if (!domTee || !Array.isArray(domTee.holeYardage) || domTee.holeYardage.length === 0) {
        const withYard = (course.tees || []).find(function (t) {
          return Array.isArray(t.holeYardage) && t.holeYardage.length > 0;
        });
        if (withYard) domTee = withYard;
      }
      const teeHasYards = !!(domTee && Array.isArray(domTee.holeYardage) && domTee.holeYardage.length > 0);
      // Dynamic label: use actual tee color label if known, otherwise generic "Tee"
      const teeColLabel = domTee ? (domTee.colorLabel || TEE_LABELS[domTee.colorKey] || 'Tee') : 'Tee';
      function yardFor(h) {
        if (!teeHasYards) return '–';
        const y = domTee.holeYardage[h - 1];
        return (typeof y === 'number' && y > 0) ? String(y) : '–';
      }

      // --- thead: 2 rows ---
      const thead = el('thead');

      // Row 1: corner (spans Loch/SI/Par/Gelb) + each player name (spans Schl | / | Stbf = colspan 3)
      const tr1 = el('tr', { class: 'hdr-row-1' });
      tr1.appendChild(el('th', { class: 'corner-cell hdr-fixed', colspan: '4' }, ['Lochdaten']));
      round.playersInRound.forEach(function (pir) {
        const th = el('th', { class: 'player-header', colspan: '3' });
        th.appendChild(el('span', { class: 'ph-dot tee-dot-' + pir.teeColorKey }));
        th.appendChild(document.createTextNode(shortName(pir.displayName, 10)));
        tr1.appendChild(th);
      });
      thead.appendChild(tr1);

      // Row 2: Loch | SI | Par | Gelb | (Schl | / | Stbf) per player
      const tr2 = el('tr', { class: 'hdr-row-2' });
      tr2.appendChild(el('th', { class: 'col-loch' }, ['Loch']));
      tr2.appendChild(el('th', { class: 'col-si'   }, ['SI']));
      tr2.appendChild(el('th', { class: 'col-par'  }, ['Par']));
      tr2.appendChild(el('th', { class: 'col-gelb', title: 'Distanz ' + teeColLabel }, [teeColLabel]));
      round.playersInRound.forEach(function () {
        tr2.appendChild(el('th', { class: 'col-schl col-schl--first-of-player' }, ['Schl']));
        tr2.appendChild(el('th', { class: 'col-slash' }, ['/']));
        tr2.appendChild(el('th', { class: 'col-stbf' }, ['Stbf']));
      });
      thead.appendChild(tr2);
      table.appendChild(thead);

      // --- tbody ---
      const tbody = el('tbody');

      // Per-player accumulators for OUT / IN
      const outAcc = round.playersInRound.map(function () { return { schl: 0, stbl: 0, any: false }; });
      const inAcc  = round.playersInRound.map(function () { return { schl: 0, stbl: 0, any: false }; });
      let parOut = 0, parIn = 0;

      // Build one hole row: Loch | SI | Par | Gelb | per player (Schl | / | Stbf)
      function buildHoleRow(h, altClass) {
        const hole = getHole(course, h);
        const tr = el('tr', { class: 'row-hole ' + altClass + (h === round.currentHole ? ' is-active' : '') });
        tr.appendChild(el('th', { class: 'col-loch' }, [String(h)]));
        tr.appendChild(el('td', { class: 'col-si'   }, [String(hole.strokeIndex)]));
        tr.appendChild(el('td', { class: 'col-par'  }, [String(hole.par)]));
        tr.appendChild(el('td', { class: 'col-gelb' }, [yardFor(h)]));

        // player blocks: 3 columns each
        round.playersInRound.forEach(function (pir, idx) {
          const given = pir.strokesPerHole[h - 1] || 0;
          const strokes = getStrokesForPlayerHole(round, idx, h);

          // Schlagzahl (click jumps to live mode on this hole)
          const schlTd = el('td', {
            class: 'col-schl col-schl--first-of-player' + (strokes <= 0 ? ' is-empty' : '')
          }, [strokes > 0 ? String(strokes) : '—']);
          schlTd.addEventListener('click', function () {
            round.currentHole = h;
            scheduleAutosave();
            state.segment = 'live';
            renderPlay();
            renderBottomNav();
          });
          tr.appendChild(schlTd);

          // Slash-Spalte (own column, separate from Schl)
          tr.appendChild(el('td', { class: 'col-slash' }, [slashChars(given)]));

          // Stableford-Spalte
          const pts = strokes > 0 ? stablefordForHole(strokes, hole.par, given) : 0;
          tr.appendChild(el('td', { class: 'col-stbf' }, [strokes > 0 ? String(pts) : '']));
        });
        return tr;
      }

      // Accumulate per-player OUT / IN from actual entries
      function accumulateHole(h, accArr) {
        const hole = getHole(course, h);
        round.playersInRound.forEach(function (pir, idx) {
          const given = pir.strokesPerHole[h - 1] || 0;
          const strokes = getStrokesForPlayerHole(round, idx, h);
          if (strokes > 0) {
            accArr[idx].schl += strokes;
            accArr[idx].stbl += stablefordForHole(strokes, hole.par, given);
            accArr[idx].any = true;
          }
        });
        return hole.par;
      }

      // --- Holes 1-9 (alternating row A/B) ---
      for (let h = 1; h <= 9; h++) {
        parOut += accumulateHole(h, outAcc);
        tbody.appendChild(buildHoleRow(h, (h % 2 === 1) ? 'row-a' : 'row-b'));
      }

      // --- OUT summary row ---
      const outRow = el('tr', { class: 'row-summary row-out' });
      outRow.appendChild(el('th', { class: 'col-loch' }, ['OUT']));
      outRow.appendChild(el('td', { class: 'col-si'   }, ['']));
      outRow.appendChild(el('td', { class: 'col-par'  }, [String(parOut)]));
      outRow.appendChild(el('td', { class: 'col-gelb' }, ['']));
      round.playersInRound.forEach(function (_, idx) {
        const a = outAcc[idx];
        outRow.appendChild(el('td', { class: 'col-schl col-schl--first-of-player' }, [a.any ? String(a.schl) : '']));
        outRow.appendChild(el('td', { class: 'col-slash' }, ['']));
        outRow.appendChild(el('td', { class: 'col-stbf' }, [a.any ? String(a.stbl) : '']));
      });
      tbody.appendChild(outRow);

      // --- Holes 10-18 ---
      for (let h = 10; h <= 18; h++) {
        parIn += accumulateHole(h, inAcc);
        tbody.appendChild(buildHoleRow(h, (h % 2 === 1) ? 'row-a' : 'row-b'));
      }

      // --- IN summary row ---
      const inRow = el('tr', { class: 'row-summary row-in' });
      inRow.appendChild(el('th', { class: 'col-loch' }, ['IN']));
      inRow.appendChild(el('td', { class: 'col-si'   }, ['']));
      inRow.appendChild(el('td', { class: 'col-par'  }, [String(parIn)]));
      inRow.appendChild(el('td', { class: 'col-gelb' }, ['']));
      round.playersInRound.forEach(function (_, idx) {
        const a = inAcc[idx];
        inRow.appendChild(el('td', { class: 'col-schl col-schl--first-of-player' }, [a.any ? String(a.schl) : '']));
        inRow.appendChild(el('td', { class: 'col-slash' }, ['']));
        inRow.appendChild(el('td', { class: 'col-stbf' }, [a.any ? String(a.stbl) : '']));
      });
      tbody.appendChild(inRow);

      // --- TOTAL row ---
      const totalRow = el('tr', { class: 'row-summary row-total' });
      totalRow.appendChild(el('th', { class: 'col-loch' }, ['TOT']));
      totalRow.appendChild(el('td', { class: 'col-si'   }, ['']));
      totalRow.appendChild(el('td', { class: 'col-par'  }, [String(parOut + parIn)]));
      totalRow.appendChild(el('td', { class: 'col-gelb' }, ['']));
      round.playersInRound.forEach(function (_, idx) {
        const any = outAcc[idx].any || inAcc[idx].any;
        const s = outAcc[idx].schl + inAcc[idx].schl;
        const p = outAcc[idx].stbl + inAcc[idx].stbl;
        totalRow.appendChild(el('td', { class: 'col-schl col-schl--first-of-player' }, [any ? String(s) : '']));
        totalRow.appendChild(el('td', { class: 'col-slash' }, ['']));
        totalRow.appendChild(el('td', { class: 'col-stbf' }, [any ? String(p) : '']));
      });
      tbody.appendChild(totalRow);

      table.appendChild(tbody);
      wrap.appendChild(table);
      pane.appendChild(wrap);

      // Scroll active hole row into view (vertical)
      requestAnimationFrame(function () {
        const target = wrap.querySelector('tr.row-hole.is-active');
        if (target) {
          const wRect = wrap.getBoundingClientRect();
          const tRect = target.getBoundingClientRect();
          const offset = (tRect.top - wRect.top) - (wRect.height / 2) + (tRect.height / 2);
          wrap.scrollTop += offset;
        }
      });
    }
    function buildStrokeCell(round, course, idx, pir, holeNumber) {
      const hole = getHole(course, holeNumber);
      const given = pir.strokesPerHole[holeNumber - 1] || 0;
      const strokes = getStrokesForPlayerHole(round, idx, holeNumber);
      const td = el('td', { class: 'stroke-cell' });
      const num = el('span', { class: 'stroke-num' + (strokes <= 0 ? ' is-empty' : '') }, [strokes > 0 ? String(strokes) : '—']);
      td.appendChild(num);
      const slash = slashChars(given);
      if (slash) {
        td.appendChild(el('span', { class: 'stroke-slash' }, [slash]));
      }
      if (holeNumber === round.currentHole) {
        td.classList.add('active-hole-mark');
        td.classList.add('active-hole-col');
      }
      td.addEventListener('click', function () {
        round.currentHole = holeNumber;
        saveState();
        state.segment = 'live';
        renderPlay();
        renderBottomNav();
        // Scroll to player block
        requestAnimationFrame(function () {
          const block = document.querySelector('.player-block[data-player-idx="' + idx + '"]');
          if (block && block.scrollIntoView) {
            block.scrollIntoView({ block: 'center', behavior: 'auto' });
          }
        });
      });
      return td;
    }

    // ============================================================
    // Results screen rendering
    // ============================================================
    function renderResults() {
      const root = document.getElementById('screen-results');
      root.innerHTML = '';
      const round = state.activeRound;
      if (!round) {
        root.appendChild(el('div', { class: 'empty-state padded' }, [
          'Keine aktive Runde. Starte eine Runde im Setup.'
        ]));
        return;
      }
      const course = getCourseForRound(round);
      const scroll = el('div', { class: 'scroll-area' });
      const padded = el('div', { class: 'padded stack' });

      const hdr = el('div', {});
      hdr.appendChild(el('h2', { style: 'font-size:16px;' }, [
        round.status === 'finished' ? 'Runde abgeschlossen' : 'Aktueller Stand'
      ]));
      hdr.appendChild(el('div', { class: 'small' }, [course.name + ' — ' + formatDate(round.date)]));
      padded.appendChild(hdr);

      const ranking = getRanking(round);
      ranking.forEach(function (entry) {
        padded.appendChild(renderRankingCard(entry, round, course));
      });

      const actions = el('div', { class: 'results-actions' });
      const exportBtn = el('button', { class: 'btn', type: 'button' }, ['Exportieren']);
      exportBtn.addEventListener('click', exportData);
      const newRound = el('button', { class: 'btn btn-primary', type: 'button' }, ['Neue Runde']);
      newRound.addEventListener('click', function () {
        openDialog({
          title: 'Neue Runde starten?',
          message: 'Die aktuelle Runde wird beendet und entfernt. Setup-Daten der Runde werden verworfen.',
          confirmText: 'Ja, beenden',
          confirmKind: 'danger',
          onConfirm: function () {
            discardActiveRound();
            state.setupDraft = null;
            setScreen('setup');
          }
        });
      });
      actions.appendChild(exportBtn);
      actions.appendChild(newRound);
      padded.appendChild(actions);

      scroll.appendChild(padded);
      root.appendChild(scroll);
    }
    function renderRankingCard(entry, round, course) {
      const card = el('div', { class: 'ranking-card' + (entry.rank === 1 ? ' is-leader' : '') });
      const top = el('div', { class: 'rc-top' });
      top.appendChild(el('div', { class: 'rc-rank' }, [entry.rank + '.']));
      top.appendChild(el('div', { class: 'rc-stbl' }, [entry.totals.stablefordTotal + ' Pkt']));
      card.appendChild(top);
      card.appendChild(el('div', { class: 'rc-name' }, [entry.pir.displayName]));
      card.appendChild(el('div', { class: 'rc-hcp' }, [
        'HCP ' + entry.pir.handicapIndexAtRound.toFixed(1) +
        ' · SPH ' + entry.pir.playingHandicap +
        ' · ' + (TEE_LABELS[entry.pir.teeColorKey] || entry.pir.teeColorKey)
      ]));
      const stats = el('div', { class: 'rc-stats' });
      stats.appendChild(el('span', {}, ['Brutto: ', el('strong', {}, [String(entry.totals.grossTotal)])]));
      stats.appendChild(el('span', {}, ['Netto: ', el('strong', {}, [String(entry.totals.netTotal)])]));
      stats.appendChild(el('span', {}, ['+/−: ', el('strong', {}, [
        entry.totals.anyEntered ? formatToPar(entry.totals.toParGross) : '—'
      ])]));
      card.appendChild(stats);
      // Spark
      const spark = el('div', { class: 'rc-spark' });
      for (let h = 1; h <= 18; h++) {
        const s = getStrokesForPlayerHole(round, entry.idx, h);
        const hole = getHole(course, h);
        const given = entry.pir.strokesPerHole[h - 1] || 0;
        const pts = s > 0 ? stablefordForHole(s, hole.par, given) : null;
        const cls = pts === null ? 'pt empty' : ('pt p' + pts);
        spark.appendChild(el('div', { class: cls, title: 'Loch ' + h }, [pts === null ? '·' : String(pts)]));
      }
      card.appendChild(spark);
      return card;
    }

    // ============================================================
    // History screen (v1.3)
    // ============================================================
    // Build a sorted snapshot of all saved rounds for the history table.
    // Rounds are sorted by updatedAt desc (fallback createdAt / date).
    function getHistoryRounds() {
      const list = (state.appState.rounds || []).slice();
      list.sort(function (a, b) {
        const ta = new Date(a.updatedAt || a.createdAt || a.date || 0).getTime();
        const tb = new Date(b.updatedAt || b.createdAt || b.date || 0).getTime();
        return tb - ta;
      });
      return list;
    }
    function renderHistory() {
      const root = document.getElementById('screen-history');
      root.innerHTML = '';
      const scroll = el('div', { class: 'scroll-area' });
      const wrap = el('div', { class: 'history-wrap' });

      // Open-rounds banner (open rounds never appear in history table).
      const openCount = getOpenRounds().length;
      if (openCount > 0) {
        const draftBanner = el('div', {
          class: 'history-banner',
          style: 'cursor:pointer; border-radius:8px; margin-bottom:10px; padding:8px 12px; border:1px solid #2F6B3A; background:#EFF4EF;'
        });
        draftBanner.appendChild(el('strong', {}, [
          openCount === 1 ? 'Laufende Runde vorhanden' : (openCount + ' offene Spiele vorhanden')
        ]));
        draftBanner.appendChild(document.createTextNode(' — siehe Setup, um fortzufahren.'));
        draftBanner.addEventListener('click', function () {
          setScreen('setup');
        });
        wrap.appendChild(draftBanner);
      }

      wrap.appendChild(el('div', { class: 'history-title' }, ['Gespeicherte Runden']));
      wrap.appendChild(el('div', { class: 'history-subtitle' }, [
        'Tippe auf eine Zeile, um die gespeicherte Turnierkarte zu oeffnen.'
      ]));

      const rounds = getHistoryRounds();
      if (rounds.length === 0) {
        wrap.appendChild(el('div', { class: 'history-empty' }, [
          'Noch keine gespeicherten Runden.'
        ]));
        scroll.appendChild(wrap);
        root.appendChild(scroll);
        return;
      }

      const table = el('table', { class: 'history-table' });
      const thead = el('thead');
      const trH = el('tr');
      trH.appendChild(el('th', {}, ['Datum']));
      trH.appendChild(el('th', {}, ['Platz / Spieler']));
      trH.appendChild(el('th', { class: 'history-col-actions' }, ['']));
      thead.appendChild(trH);
      table.appendChild(thead);

      const tbody = el('tbody');
      rounds.forEach(function (r) {
        const tr = el('tr', { class: 'history-row', 'data-round-id': r.id });
        // Datum cell (YYYY.DD.MM + small time)
        const tdDate = el('td');
        tdDate.appendChild(el('div', { class: 'h-date' }, [formatDate(r.date || r.createdAt)]));
        const time = formatTime(r.date || r.createdAt);
        if (time) tdDate.appendChild(el('div', { class: 'h-time' }, [time + ' Uhr']));
        tr.appendChild(tdDate);

        // Platz + Spieler cell
        const tdMain = el('td');
        const courseLine = el('div', { class: 'h-course' });
        courseLine.appendChild(document.createTextNode(r.courseName || 'Unbekannter Platz'));
        const badge = el('span', {
          class: 'h-status-badge ' + (r.status === 'finished' ? 'finished' : 'active')
        }, [r.status === 'finished' ? 'Abgeschl.' : 'Laufend']);
        courseLine.appendChild(badge);
        tdMain.appendChild(courseLine);
        const names = (r.playersInRound || []).map(function (p) { return p.displayName; }).join(', ');
        if (names) tdMain.appendChild(el('div', { class: 'h-players' }, [names]));
        tr.appendChild(tdMain);

        // Delete button
        const tdAct = el('td', { class: 'history-col-actions' });
        const delBtn = el('button', {
          class: 'history-del', type: 'button',
          'aria-label': 'Runde loeschen', title: 'Runde loeschen'
        }, ['🗑']);
        delBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          openDialog({
            title: 'Gespeicherte Runde loeschen?',
            message: 'Die Runde vom ' + formatDate(r.date || r.createdAt) +
                     ' (' + (r.courseName || '') + ') wird entfernt. Diese Aktion kann nicht rueckgaengig gemacht werden.',
            confirmText: 'Loeschen',
            confirmKind: 'danger',
            onConfirm: function () { deleteSavedRound(r.id); }
          });
        });
        tdAct.appendChild(delBtn);
        tr.appendChild(tdAct);

        // Row click opens the saved round's scorecard view
        tr.addEventListener('click', function () { openSavedRound(r.id); });

        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      wrap.appendChild(table);
      scroll.appendChild(wrap);
      root.appendChild(scroll);
    }

    // ============================================================
    // Overlay (modal & sheet)
    // ============================================================
    const overlayRoot = document.getElementById('overlay-root');
    const overlayContent = document.getElementById('overlay-content');
    function openSheet(contentNode) {
      overlayContent.className = 'overlay-content sheet';
      overlayContent.innerHTML = '';
      overlayContent.appendChild(contentNode);
      overlayRoot.classList.add('is-open');
      overlayRoot.setAttribute('aria-hidden', 'false');
    }
    function openDialogContent(contentNode) {
      overlayContent.className = 'overlay-content dialog';
      overlayContent.innerHTML = '';
      overlayContent.appendChild(contentNode);
      overlayRoot.classList.add('is-open');
      overlayRoot.setAttribute('aria-hidden', 'false');
    }
    function closeOverlay() {
      overlayRoot.classList.remove('is-open');
      overlayRoot.setAttribute('aria-hidden', 'true');
      overlayContent.innerHTML = '';
    }
    function openDialog(opts) {
      const content = el('div');
      content.appendChild(el('div', { class: 'overlay-header' }, [opts.title || 'Bestaetigung']));
      content.appendChild(el('div', { class: 'overlay-body' }, [
        el('div', {}, [opts.message || ''])
      ]));
      const actions = el('div', { class: 'overlay-actions' });
      if (!opts.hideCancel) {
        const cancel = el('button', { class: 'btn', type: 'button' }, [opts.cancelText || 'Abbrechen']);
        cancel.addEventListener('click', function () {
          closeOverlay();
          if (opts.onCancel) opts.onCancel();
        });
        actions.appendChild(cancel);
      }
      const confirmCls = opts.confirmKind === 'danger' ? 'btn btn-danger' : 'btn btn-primary';
      const confirm = el('button', { class: confirmCls, type: 'button' }, [opts.confirmText || 'OK']);
      confirm.addEventListener('click', function () {
        closeOverlay();
        if (opts.onConfirm) opts.onConfirm();
      });
      actions.appendChild(confirm);
      content.appendChild(actions);
      openDialogContent(content);
    }

    // ============================================================
    // Toast
    // ============================================================
    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('is-visible');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(function () {
        t.classList.remove('is-visible');
      }, 2000);
    }

    // ============================================================
    // Helpers
    // ============================================================
    function el(tag, attrs, children) {
      const node = document.createElement(tag);
      if (attrs) {
        for (const k in attrs) {
          if (!Object.prototype.hasOwnProperty.call(attrs, k)) continue;
          if (k === 'class') node.className = attrs[k];
          else node.setAttribute(k, attrs[k]);
        }
      }
      if (children) {
        children.forEach(function (c) {
          if (c == null || c === false) return;
          if (typeof c === 'string' || typeof c === 'number') {
            node.appendChild(document.createTextNode(String(c)));
          } else {
            node.appendChild(c);
          }
        });
      }
      return node;
    }
    // Date format jjjj.tt.mm (yyyy.dd.mm) as requested
    function formatDate(iso) {
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) return '';
        const dd = String(d.getDate()).padStart(2, '0');
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const yy = d.getFullYear();
        return yy + '.' + dd + '.' + mm;
      } catch (e) {
        return '';
      }
    }
    function formatTime(iso) {
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) return '';
        const hh = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return hh + ':' + mi;
      } catch (e) {
        return '';
      }
    }

    // ============================================================
    // Master render & init
    // ============================================================
    function renderAll() {
      // toggle screen visibility (local var 'screenEl' avoids shadowing 'el' helper)
      ['setup', 'play', 'results', 'history', 'data'].forEach(function (name) {
        const screenEl = document.getElementById('screen-' + name);
        screenEl.classList.toggle('is-active', name === state.activeScreen);
      });
      renderTopbar();
      renderBottomNav();
      if (state.activeScreen === 'setup') renderSetup();
      else if (state.activeScreen === 'play') renderPlay();
      else if (state.activeScreen === 'results') renderResults();
      else if (state.activeScreen === 'history') renderHistory();
      else if (state.activeScreen === 'data') renderData();
    }

    function bindGlobalEvents() {
      const nav = document.getElementById('bottomnav');
      nav.querySelectorAll('button').forEach(function (btn) {
        btn.addEventListener('click', function () {
          const target = btn.getAttribute('data-screen');
          setScreen(target);
        });
      });
      // overlay backdrop close
      overlayRoot.addEventListener('click', function (e) {
        if (e.target && e.target.getAttribute('data-overlay-close') === 'true') {
          closeOverlay();
        }
      });
      // ESC closes overlay
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && overlayRoot.classList.contains('is-open')) {
          closeOverlay();
        }
      });
      // Flush pending autosave before unload / tab hide so no input is lost.
      window.addEventListener('beforeunload', function () { flushAutosave(); });
      window.addEventListener('pagehide', function () { flushAutosave(); });
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'hidden') flushAutosave();
      });
    }

    function init() {
      loadState();
      // App start: always land on Setup. Open rounds are shown as a list on the
      // Setup screen (the "Startseite"), so the user explicitly picks what to
      // resume — no silent restore, no single-draft dialog.
      state.activeScreen = 'setup';
      state.setupDraft = newSetupDraft();
      bindGlobalEvents();
      renderAll();
    }
    // Show a dedicated restore prompt with meaningful context about the draft.
    function showDraftRestoreDialog(draft) {
      const course = getCourseForRound(draft);
      const courseName = draft.courseName || (course ? course.name : 'Unbekannter Platz');
      const dateStr = formatDate(draft.date || draft.createdAt);
      const names = (draft.playersInRound || []).map(function (p) { return p.displayName; }).join(', ');
      const savedDate = formatDate(draft.updatedAt);
      const savedTime = formatTime(draft.updatedAt);
      const holeInfo = draft.currentHole ? ('Loch ' + draft.currentHole) : '';

      const content = el('div');
      content.appendChild(el('div', { class: 'overlay-header' }, ['Laufende Runde gefunden']));
      const body = el('div', { class: 'overlay-body' });
      const info = el('div', { style: 'display:flex; flex-direction:column; gap:4px; font-size:13px;' });
      info.appendChild(el('div', {}, [el('strong', {}, ['Platz: ']), courseName]));
      info.appendChild(el('div', {}, [el('strong', {}, ['Datum: ']), dateStr]));
      if (names) info.appendChild(el('div', {}, [el('strong', {}, ['Spieler: ']), names]));
      if (holeInfo) info.appendChild(el('div', {}, [el('strong', {}, ['Stand: ']), holeInfo]));
      info.appendChild(el('div', { class: 'small', style: 'margin-top:6px;' }, [
        'Zuletzt gespeichert: ' + savedDate + (savedTime ? ' um ' + savedTime + ' Uhr' : '')
      ]));
      body.appendChild(info);
      content.appendChild(body);

      const actions = el('div', { class: 'overlay-actions' });
      const discardBtn = el('button', { class: 'btn btn-danger', type: 'button' }, ['Verwerfen']);
      discardBtn.addEventListener('click', function () {
        closeOverlay();
        discardDraft();
        showToast('Entwurf verworfen');
        renderAll();
      });
      const restoreBtn = el('button', { class: 'btn btn-primary', type: 'button' }, ['Wiederherstellen']);
      restoreBtn.addEventListener('click', function () {
        closeOverlay();
        state.activeRound = draft;
        state.segment = 'live';
        setScreen('play');
      });
      actions.appendChild(discardBtn);
      actions.appendChild(restoreBtn);
      content.appendChild(actions);
      openDialogContent(content);
    }

    // Script is at end of <body>, so DOM is typically already parsed here.
    // Guard against DOMContentLoaded having already fired (in which case the
    // listener would never run).
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
