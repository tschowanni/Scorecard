<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2F6B3A" />
  <title>Turnierkarte Pur — Live &amp; Karte</title>
  <!-- Inline SVG favicon (golf flag + ball on green) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%232F6B3A'/><path d='M0 50 Q16 44 32 46 Q48 48 64 50 L64 64 L0 64 Z' fill='%231F4A28'/><rect x='39' y='12' width='2.5' height='40' rx='1' fill='%23FFFFFF'/><path d='M41.5 13 L58 18 L41.5 23 Z' fill='%23DA7101'/><circle cx='20' cy='50' r='6.5' fill='%23FFFFFF'/><circle cx='18' cy='48.5' r='0.8' fill='%23BFBDB4'/><circle cx='22' cy='48.5' r='0.8' fill='%23BFBDB4'/><circle cx='20' cy='52' r='0.8' fill='%23BFBDB4'/><circle cx='17' cy='51' r='0.8' fill='%23BFBDB4'/><circle cx='23' cy='51' r='0.8' fill='%23BFBDB4'/></svg>" />
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%232F6B3A'/><path d='M0 50 Q16 44 32 46 Q48 48 64 50 L64 64 L0 64 Z' fill='%231F4A28'/><rect x='39' y='12' width='2.5' height='40' rx='1' fill='%23FFFFFF'/><path d='M41.5 13 L58 18 L41.5 23 Z' fill='%23DA7101'/><circle cx='20' cy='50' r='6.5' fill='%23FFFFFF'/></svg>" />
  <style>
    /* ---------- Reset & base ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.35;
      color: #1A1A1A;
      background: #FAFAF7;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    button {
      font: inherit;
      color: inherit;
      cursor: pointer;
      /* Prevent iOS double-tap zoom + accidental text selection on long-press */
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
    input, select { font: inherit; color: inherit; }
    h1, h2, h3, h4 { margin: 0; font-weight: 600; }
    ul, ol { margin: 0; padding: 0; list-style: none; }

    /* ---------- App shell ---------- */
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      max-width: 720px;
      margin: 0 auto;
      background: #FAFAF7;
    }
    #topbar {
      flex: 0 0 auto;
      padding: 10px 14px 8px;
      border-bottom: 1px solid #D8D6CF;
      background: #FAFAF7;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    #topbar .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    #topbar .brand-icon {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      display: block;
    }
    #topbar .app-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #1A1A1A;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #topbar .storage-warn {
      font-size: 11px;
      color: #B23A3A;
      margin-left: 8px;
    }
    #main {
      flex: 1 1 auto;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .screen {
      display: none;
      flex: 1 1 auto;
      flex-direction: column;
      min-height: 0;
    }
    .screen.is-active { display: flex; }

    /* ---------- Bottom navigation ---------- */
    #bottomnav {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-top: 1px solid #D8D6CF;
      background: #FAFAF7;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    #bottomnav button {
      min-height: 56px;
      background: none;
      border: 0;
      border-right: 1px solid #D8D6CF;
      padding: 6px 2px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: #5A5A5A;
      font-size: 11px;
    }
    #bottomnav button:last-child { border-right: 0; }
    #bottomnav button .nav-icon {
      font-size: 18px;
      line-height: 1;
    }
    #bottomnav button.is-active {
      color: #2F6B3A;
      font-weight: 600;
    }
    #bottomnav button.is-disabled {
      color: #BBBBBB;
      opacity: 0.55;
    }

    /* ---------- Buttons ---------- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 44px;
      padding: 8px 14px;
      border: 1px solid #D8D6CF;
      border-radius: 6px;
      background: #FFFFFF;
      color: #1A1A1A;
      font-size: 14px;
      font-weight: 500;
    }
    .btn:disabled, .btn.is-disabled {
      color: #BBBBBB;
      background: #F2F1ED;
      border-color: #E2E0D9;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #2F6B3A;
      border-color: #2F6B3A;
      color: #FFFFFF;
    }
    .btn-primary:disabled, .btn-primary.is-disabled {
      background: #C7D5C9;
      border-color: #C7D5C9;
      color: #FFFFFF;
    }
    .btn-danger {
      background: #FFFFFF;
      border-color: #B23A3A;
      color: #B23A3A;
    }
    .btn-block {
      width: 100%;
    }
    .btn-large {
      min-height: 56px;
      font-size: 16px;
      font-weight: 600;
    }

    /* ---------- Generic blocks ---------- */
    .scroll-area {
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .padded { padding: 12px 14px; }
    .stack > * + * { margin-top: 12px; }
    .label {
      display: block;
      font-size: 12px;
      color: #5A5A5A;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .info-line {
      font-size: 12px;
      color: #5A5A5A;
    }
    .divider {
      height: 1px;
      background: #D8D6CF;
      margin: 14px 0;
    }
    .warn-text {
      color: #B23A3A;
      font-size: 12px;
    }
    .empty-state {
      padding: 24px 12px;
      text-align: center;
      color: #5A5A5A;
      font-size: 13px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #5A5A5A;
      margin: 8px 0 6px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .row.between { justify-content: space-between; }
    .grow { flex: 1 1 auto; }

    /* ---------- Setup screen ---------- */
    #screen-setup .course-card {
      border: 1px solid #D8D6CF;
      border-radius: 8px;
      padding: 10px 12px;
      background: #FFFFFF;
    }
    #screen-setup .course-card .course-name {
      font-size: 16px;
      font-weight: 600;
    }
    #screen-setup .course-card .course-meta {
      font-size: 12px;
      color: #5A5A5A;
      margin-top: 2px;
    }
    .tee-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .tee-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #D8D6CF;
      background: #FFFFFF;
      font-size: 13px;
      min-height: 36px;
    }
    .tee-pill .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid #888;
    }
    .tee-pill.is-selected {
      border-color: #2F6B3A;
      background: #EAF1EB;
      color: #2F6B3A;
      font-weight: 600;
    }
    .tee-dot-white  { background: #FFFFFF; }
    .tee-dot-yellow { background: #F2C500; border-color: #C7A200; }
    .tee-dot-blue   { background: #2A6FBA; border-color: #1F4F85; }
    .tee-dot-red    { background: #C13A3A; border-color: #8E2B2B; }
    .tee-dot-black  { background: #1A1A1A; border-color: #000000; }

    .player-row {
      border: 1px solid #D8D6CF;
      border-radius: 8px;
      padding: 10px 12px;
      background: #FFFFFF;
    }
    .player-row.has-error { border-color: #B23A3A; }
    .player-row .top-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .player-row .name {
      font-weight: 600;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-row .icon-btn {
      background: none;
      border: 0;
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #5A5A5A;
      font-size: 18px;
    }
    .player-row .icon-btn.danger { color: #B23A3A; }
    .player-row .row-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .stepper {
      display: inline-flex;
      align-items: center;
      border: 1px solid #D8D6CF;
      border-radius: 6px;
      overflow: hidden;
      background: #FFFFFF;
    }
    .stepper button {
      width: 36px;
      height: 36px;
      border: 0;
      background: #FFFFFF;
      font-size: 18px;
      color: #1A1A1A;
    }
    .stepper button:disabled { color: #C7C7C7; }
    .stepper .value {
      min-width: 44px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      padding: 0 4px;
    }
    .err-mark {
      color: #B23A3A;
      font-size: 14px;
      margin-left: 4px;
    }

    .accordion {
      border: 1px solid #D8D6CF;
      border-radius: 8px;
      background: #FFFFFF;
      overflow: hidden;
    }
    .accordion summary {
      padding: 12px;
      cursor: pointer;
      font-weight: 600;
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .accordion summary::-webkit-details-marker { display: none; }
    .accordion summary::after {
      content: "▾";
      font-size: 12px;
      color: #5A5A5A;
    }
    .accordion[open] summary::after { content: "▴"; }
    .accordion .accordion-body {
      padding: 0 12px 12px;
      border-top: 1px solid #D8D6CF;
    }

    /* ---------- Play screen ---------- */
    .play-header {
      flex: 0 0 auto;
      border-bottom: 1px solid #D8D6CF;
      background: #FAFAF7;
      padding: 8px 14px 0;
    }
    .status-line {
      font-size: 12px;
      color: #5A5A5A;
      display: flex;
      gap: 8px;
      align-items: baseline;
      justify-content: space-between;
    }
    .segment {
      display: inline-flex;
      margin: 8px 0;
      border: 1px solid #D8D6CF;
      border-radius: 999px;
      overflow: hidden;
      background: #FFFFFF;
    }
    .segment button {
      min-width: 96px;
      min-height: 36px;
      padding: 6px 16px;
      background: transparent;
      border: 0;
      color: #5A5A5A;
      font-weight: 500;
      font-size: 14px;
      transition: opacity 100ms linear;
    }
    .segment button.is-active {
      background: #2F6B3A;
      color: #FFFFFF;
      font-weight: 600;
    }

    .play-body {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .play-pane {
      display: none;
      flex: 1 1 auto;
      min-height: 0;
      flex-direction: column;
      opacity: 1;
      transition: opacity 100ms linear;
    }
    .play-pane.is-active { display: flex; }

    /* Live pane */
    .hole-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #D8D6CF;
      background: #FFFFFF;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .hole-header .hole-num {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .hole-header .hole-meta {
      font-size: 13px;
      color: #5A5A5A;
      display: flex;
      gap: 12px;
      font-variant-numeric: tabular-nums;
    }
    .player-blocks {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 10px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .player-block {
      border: 1px solid #D8D6CF;
      border-radius: 10px;
      background: #FFFFFF;
      padding: 10px 12px;
    }
    .player-block .pb-row1 {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .player-block .pb-name {
      font-weight: 600;
      font-size: 16px;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-block .pb-hcp {
      color: #5A5A5A;
      font-size: 12px;
    }
    .player-block .pb-slash {
      color: #444444;
      font-size: 22px;
      letter-spacing: 1px;
      margin-left: 4px;
      font-variant-numeric: tabular-nums;
    }
    .player-block .pb-row2 {
      display: grid;
      grid-template-columns: 56px 1fr 56px;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .player-block .stroke-btn {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      border: 1px solid #D8D6CF;
      background: #FFFFFF;
      font-size: 28px;
      font-weight: 600;
      color: #1A1A1A;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }
    .player-block .stroke-btn:active:not(:disabled) {
      background: #EAF1EB;
      border-color: #2F6B3A;
    }
    .player-block .stroke-btn:disabled { color: #C7C7C7; background: #F4F2EC; }
    .player-block .stroke-value {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #1A1A1A;
    }
    .player-block .stroke-value.is-empty { color: #BBBBBB; font-weight: 400; }
    .player-block .pb-row3 {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 8px;
      font-size: 12px;
      color: #5A5A5A;
      font-variant-numeric: tabular-nums;
    }
    .player-block .pb-row3 strong { color: #1A1A1A; font-weight: 600; }

    .hole-nav {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 8px 14px 12px;
      border-top: 1px solid #D8D6CF;
      background: #FAFAF7;
    }
    .hole-nav .btn { min-height: 56px; font-size: 15px; font-weight: 600; }

    /* Card pane */
    /* ---------- Tournament Scorecard (paper-style: holes = rows, players = column blocks) ---------- */
    .card-pane { background: #FFFFFF; }
    .card-pane .card-mini-header {
      padding: 8px 12px 6px;
      font-size: 12px;
      color: #5A5A5A;
      border-bottom: 1px solid #BFBDB4;
      background: #F4F2EC;
    }
    .card-mini-header .course-line { font-weight: 700; color: #1A1A1A; font-size: 13px; }
    .card-mini-header .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px; }
    .card-mini-header .legend .player-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #1A1A1A; }
    .card-mini-header .legend .dot { width: 9px; height: 9px; border-radius: 50%; border: 1px solid #888; display: inline-block; }

    .scorecard-wrap {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      background: #FFFFFF;
      touch-action: pan-x pan-y pinch-zoom;
    }
    table.scorecard {
      border-collapse: separate;
      border-spacing: 0;
      width: max-content;
      min-width: 100%;
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      color: #1A1A1A;
    }
    table.scorecard th,
    table.scorecard td {
      border-right: 1px solid #BFBDB4;
      border-bottom: 1px solid #BFBDB4;
      padding: 2px 3px;
      text-align: center;
      vertical-align: middle;
      background: #FFFFFF;
      height: 26px;
      line-height: 1.1;
    }
    table.scorecard th:last-child, table.scorecard td:last-child { border-right: 0; }

    /* --- Column widths (compact) --- */
    table.scorecard .col-loch  { min-width: 34px; width: 34px; }
    table.scorecard .col-si    { min-width: 26px; width: 26px; }
    table.scorecard .col-par   { min-width: 26px; width: 26px; }
    table.scorecard .col-gelb  { min-width: 38px; width: 38px; }
    table.scorecard .col-schl  { min-width: 34px; width: 34px; }
    table.scorecard .col-slash { min-width: 22px; width: 22px; }
    table.scorecard .col-stbf  { min-width: 26px; width: 26px; }

    /* --- Sticky top header rows --- */
    table.scorecard thead th {
      position: sticky;
      z-index: 2;
      background: #2F6B3A;
      color: #FFFFFF;
      font-weight: 700;
      font-size: 11px;
      border-right-color: #1F4A28;
      border-bottom-color: #1F4A28;
    }
    table.scorecard thead tr.hdr-row-1 th { top: 0; height: 22px; }
    table.scorecard thead tr.hdr-row-2 th { top: 22px; height: 20px; font-size: 10px; letter-spacing: 0.02em; }
    table.scorecard thead th.player-header { padding: 2px 6px; white-space: nowrap; }
    table.scorecard thead th.player-header .ph-dot {
      width: 8px; height: 8px; margin-right: 4px; vertical-align: middle; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.6); display: inline-block;
    }
    table.scorecard thead th.corner-cell { background: #1F4A28; }

    /* --- Sticky left columns (Loch/SI/Par/Gelb) --- */
    table.scorecard tbody th.col-loch,
    table.scorecard tbody td.col-si,
    table.scorecard tbody td.col-par,
    table.scorecard tbody td.col-gelb {
      position: sticky;
      z-index: 1;
      font-weight: 600;
    }
    table.scorecard tbody th.col-loch { left: 0; }
    table.scorecard tbody td.col-si   { left: 34px; }
    table.scorecard tbody td.col-par  { left: 60px; }
    table.scorecard tbody td.col-gelb { left: 86px; }

    /* Header-row-2 (data labels) sticky positions */
    table.scorecard thead tr.hdr-row-2 th.col-loch  { left: 0;   z-index: 3; }
    table.scorecard thead tr.hdr-row-2 th.col-si    { left: 34px; z-index: 3; }
    table.scorecard thead tr.hdr-row-2 th.col-par   { left: 60px; z-index: 3; }
    table.scorecard thead tr.hdr-row-2 th.col-gelb  { left: 86px; z-index: 3; }
    /* Header-row-1 corner block spans the 4 fixed cols */
    table.scorecard thead tr.hdr-row-1 th.hdr-fixed { left: 0; z-index: 3; }

    /* --- Player block separators (thick left border starts each player, thick right ends) --- */
    table.scorecard thead th.player-header { border-left: 2px solid #8A8878; border-right: 2px solid #8A8878; }
    table.scorecard thead tr.hdr-row-2 th.col-schl.col-schl--first-of-player,
    table.scorecard tbody td.col-schl.col-schl--first-of-player {
      border-left: 2px solid #8A8878;
    }
    table.scorecard thead tr.hdr-row-2 th.col-stbf,
    table.scorecard tbody td.col-stbf {
      border-right: 2px solid #8A8878;
    }

    /* --- Alternating row colors for hole rows --- */
    table.scorecard tr.row-hole.row-a td,
    table.scorecard tr.row-hole.row-a th { background: #FFFFFF; }
    table.scorecard tr.row-hole.row-b td,
    table.scorecard tr.row-hole.row-b th { background: #F7F6EF; }

    /* Left fixed cells get slightly stronger background so they remain readable when sticky */
    table.scorecard tr.row-hole.row-a th.col-loch,
    table.scorecard tr.row-hole.row-a td.col-si,
    table.scorecard tr.row-hole.row-a td.col-par,
    table.scorecard tr.row-hole.row-a td.col-gelb { background: #F4F2EC; color: #1A1A1A; }
    table.scorecard tr.row-hole.row-b th.col-loch,
    table.scorecard tr.row-hole.row-b td.col-si,
    table.scorecard tr.row-hole.row-b td.col-par,
    table.scorecard tr.row-hole.row-b td.col-gelb { background: #EDEBE2; color: #1A1A1A; }

    /* SI cells slightly gray */
    table.scorecard tbody td.col-si { color: #5A5A5A; font-size: 11px; font-weight: 500; }

    /* Slash cells: sekundaer */
    table.scorecard td.col-slash {
      font-size: 11px;
      color: #B23A3A;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    /* Stbf cells: klar sichtbar, etwas ruhiger */
    table.scorecard td.col-stbf {
      font-weight: 600;
      font-size: 12px;
      color: #1A1A1A;
    }
    /* Schl cells: dominant */
    table.scorecard td.col-schl {
      font-weight: 700;
      font-size: 14px;
      color: #1A1A1A;
      cursor: pointer;
    }
    table.scorecard td.col-schl:hover { background: #EFF4EF; }
    table.scorecard td.col-schl.is-empty { color: #BBBBBB; font-weight: 400; }

    /* --- Summary rows: OUT / IN / TOTAL --- */
    table.scorecard tr.row-summary td,
    table.scorecard tr.row-summary th {
      background: #ECEAE3;
      font-weight: 700;
      color: #1A1A1A;
      border-top: 2px solid #8A8878;
    }
    table.scorecard tr.row-summary th.col-loch,
    table.scorecard tr.row-summary td.col-si,
    table.scorecard tr.row-summary td.col-par,
    table.scorecard tr.row-summary td.col-gelb { background: #DCDAD0; }
    /* TOT row extra emphasis */
    table.scorecard tr.row-total td,
    table.scorecard tr.row-total th {
      background: #2F6B3A;
      color: #FFFFFF;
      border-top: 2px solid #1F4A28;
      border-bottom: 2px solid #1F4A28;
      font-weight: 800;
    }
    table.scorecard tr.row-total th.col-loch,
    table.scorecard tr.row-total td.col-si,
    table.scorecard tr.row-total td.col-par,
    table.scorecard tr.row-total td.col-gelb { background: #1F4A28; color: #FFFFFF; }

    /* --- 4-player density: denser columns, shorter header text handled in JS --- */
    table.scorecard.is-4players { font-size: 11px; }
    table.scorecard.is-4players .col-loch  { min-width: 30px; width: 30px; }
    table.scorecard.is-4players .col-si    { min-width: 24px; width: 24px; }
    table.scorecard.is-4players .col-par   { min-width: 24px; width: 24px; }
    table.scorecard.is-4players .col-gelb  { min-width: 32px; width: 32px; }
    table.scorecard.is-4players .col-schl  { min-width: 30px; width: 30px; }
    table.scorecard.is-4players .col-slash { min-width: 18px; width: 18px; }
    table.scorecard.is-4players .col-stbf  { min-width: 22px; width: 22px; }
    table.scorecard.is-4players th,
    table.scorecard.is-4players td {
      padding: 1px 2px;
      height: 24px;
    }
    table.scorecard.is-4players td.col-schl { font-size: 13px; }
    table.scorecard.is-4players td.col-stbf { font-size: 11px; }
    table.scorecard.is-4players td.col-slash { font-size: 10px; }
    /* Adjust sticky left column offsets for 4-player mode */
    table.scorecard.is-4players tbody td.col-si   { left: 30px; }
    table.scorecard.is-4players tbody td.col-par  { left: 54px; }
    table.scorecard.is-4players tbody td.col-gelb { left: 78px; }
    table.scorecard.is-4players thead tr.hdr-row-2 th.col-si   { left: 30px; }
    table.scorecard.is-4players thead tr.hdr-row-2 th.col-par  { left: 54px; }
    table.scorecard.is-4players thead tr.hdr-row-2 th.col-gelb { left: 78px; }

    /* --- Print button in card mini header --- */
    .card-mini-header .mini-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-mini-header .print-btn {
      padding: 4px 10px;
      min-height: 30px;
      font-size: 11px;
      border: 1px solid #D8D6CF;
      border-radius: 6px;
      background: #FFFFFF;
      color: #1A1A1A;
      cursor: pointer;
    }

    /* --- Print / PDF view --- */
    @media print {
      @page { size: A4 landscape; margin: 8mm; }
      html, body { background: #FFFFFF; }
      /* Hide everything except the active play screen's card pane */
      #topbar, #bottomnav, .play-header, .play-pane:not(.is-active), .card-mini-header .print-btn,
      .gps-row, .scroll-area > *:not(.scorecard-wrap), #overlay-root, #toast,
      #screen-setup, #screen-results, #screen-data { display: none !important; }
      #app { max-width: none; margin: 0; }
      .card-pane { display: flex !important; flex-direction: column; }
      .card-mini-header {
        border-bottom: 1px solid #000000;
        background: #FFFFFF;
        padding: 4px 0 6px;
      }
      .card-mini-header .course-line { font-size: 14px; }
      .scorecard-wrap {
        overflow: visible !important;
        background: #FFFFFF;
      }
      /* Neutralize sticky so nothing floats weirdly on paper */
      table.scorecard thead th,
      table.scorecard tbody th.col-loch,
      table.scorecard tbody td.col-si,
      table.scorecard tbody td.col-par,
      table.scorecard tbody td.col-gelb {
        position: static !important;
        box-shadow: none !important;
      }
      /* Ensure table header repeats across printed pages */
      table.scorecard { page-break-inside: auto; }
      table.scorecard thead { display: table-header-group; }
      table.scorecard tfoot { display: table-footer-group; }
      table.scorecard tr { page-break-inside: avoid; page-break-after: auto; }
      /* Sharper print lines */
      table.scorecard th, table.scorecard td {
        border-right: 1px solid #000000 !important;
        border-bottom: 1px solid #000000 !important;
        padding: 2px 3px;
      }
      table.scorecard thead th {
        background: #FFFFFF !important;
        color: #000000 !important;
        border-bottom: 2px solid #000000 !important;
      }
      table.scorecard thead th.corner-cell,
      table.scorecard thead th.player-header {
        background: #E8E8E8 !important;
        color: #000000 !important;
      }
      /* Mute alternating row tint so print stays clean */
      table.scorecard tr.row-hole.row-b td,
      table.scorecard tr.row-hole.row-b th { background: #F7F7F7 !important; }
      table.scorecard tr.row-hole.row-a td,
      table.scorecard tr.row-hole.row-a th { background: #FFFFFF !important; }
      table.scorecard tr.row-hole.is-active td,
      table.scorecard tr.row-hole.is-active th { background: #FFFFFF !important; box-shadow: none !important; }
      /* Summary: bold print */
      table.scorecard tr.row-summary td,
      table.scorecard tr.row-summary th {
        background: #E0E0E0 !important; color: #000000 !important;
        border-top: 2px solid #000000 !important;
      }
      table.scorecard tr.row-total td,
      table.scorecard tr.row-total th {
        background: #C8C8C8 !important; color: #000000 !important;
        border-top: 2px solid #000000 !important;
        border-bottom: 2px solid #000000 !important;
      }
      /* Ensure browser prints our chosen backgrounds */
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; color-adjust: exact; }
    }

    /* --- Active hole row highlight --- */
    table.scorecard tr.row-hole.is-active td,
    table.scorecard tr.row-hole.is-active th { background: #EAF1EB !important; }
    table.scorecard tr.row-hole.is-active th.col-loch {
      background: #C9E0CD !important;
      box-shadow: inset 3px 0 0 0 #2F6B3A;
    }
    table.scorecard tr.row-hole.is-active td.col-si,
    table.scorecard tr.row-hole.is-active td.col-par,
    table.scorecard tr.row-hole.is-active td.col-gelb { background: #D7E6D9 !important; }

    /* ---------- Results screen ---------- */
    .ranking-card {
      border: 1px solid #D8D6CF;
      border-radius: 10px;
      background: #FFFFFF;
      padding: 12px;
    }
    .ranking-card.is-leader {
      border-left: 4px solid #2F6B3A;
    }
    .ranking-card .rc-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .ranking-card .rc-rank {
      font-size: 22px;
      font-weight: 700;
    }
    .ranking-card .rc-stbl {
      font-size: 18px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .ranking-card .rc-name {
      font-size: 15px;
      font-weight: 600;
      margin-top: 2px;
    }
    .ranking-card .rc-hcp {
      font-size: 12px;
      color: #5A5A5A;
    }
    .ranking-card .rc-stats {
      display: flex;
      gap: 14px;
      font-size: 13px;
      color: #5A5A5A;
      margin-top: 8px;
      flex-wrap: wrap;
      font-variant-numeric: tabular-nums;
    }
    .ranking-card .rc-stats strong { color: #1A1A1A; font-weight: 600; }
    .ranking-card .rc-spark {
      display: grid;
      grid-template-columns: repeat(18, 1fr);
      gap: 2px;
      margin-top: 8px;
    }
    .ranking-card .rc-spark .pt {
      font-size: 9px;
      text-align: center;
      padding: 2px 0;
      background: #F4F2EC;
      border-radius: 2px;
      font-variant-numeric: tabular-nums;
      color: #5A5A5A;
    }
    .ranking-card .rc-spark .pt.empty { color: #BBBBBB; }
    .ranking-card .rc-spark .pt.p0 { background: #F4F2EC; }
    .ranking-card .rc-spark .pt.p1 { background: #EAEAEA; }
    .ranking-card .rc-spark .pt.p2 { background: #DDEAE0; color: #1A1A1A; }
    .ranking-card .rc-spark .pt.p3 { background: #BFD9C5; color: #1A1A1A; }
    .ranking-card .rc-spark .pt.p4,
    .ranking-card .rc-spark .pt.p5 { background: #2F6B3A; color: #FFFFFF; }
    .results-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    /* ---------- Data screen ---------- */
    .data-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .data-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid #D8D6CF;
      border-radius: 8px;
      background: #FFFFFF;
    }
    .data-row .meta {
      font-size: 12px;
      color: #5A5A5A;
    }
    .data-row .name {
      font-weight: 600;
    }
    .data-row .actions {
      display: flex;
      gap: 6px;
    }
    .data-row .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      border: 1px solid #D8D6CF;
      background: #FFFFFF;
      color: #5A5A5A;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .data-row .icon-btn.danger { color: #B23A3A; border-color: #E6C5C5; }

    /* ---------- Overlay (modals & sheets) ---------- */
    #overlay-root {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
    }
    #overlay-root.is-open { display: block; }
    .overlay-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(20, 20, 20, 0.4);
    }
    .overlay-content {
      position: absolute;
      left: 0;
      right: 0;
      max-width: 720px;
      margin: 0 auto;
      background: #FFFFFF;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
      max-height: 90vh;
      overflow-y: auto;
    }
    .overlay-content.sheet {
      bottom: 0;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .overlay-content.dialog {
      top: 50%;
      transform: translateY(-50%);
      border-radius: 12px;
      max-width: 440px;
      margin: 0 14px;
      left: 0; right: 0;
    }
    .overlay-header {
      padding: 14px 14px 6px;
      font-weight: 600;
      font-size: 16px;
      border-bottom: 1px solid #E2E0D9;
    }
    .overlay-body {
      padding: 14px;
    }
    .overlay-actions {
      padding: 12px 14px 16px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      border-top: 1px solid #E2E0D9;
    }
    .overlay-actions .btn { min-width: 100px; }

    .field {
      display: block;
      margin-bottom: 12px;
    }
    .field input[type="text"],
    .field input[type="number"] {
      width: 100%;
      min-height: 44px;
      padding: 8px 10px;
      border: 1px solid #D8D6CF;
      border-radius: 6px;
      background: #FFFFFF;
      font-size: 15px;
    }

    /* ---------- Toast ---------- */
    #toast {
      position: fixed;
      left: 50%;
      bottom: 80px;
      transform: translateX(-50%);
      background: #1A1A1A;
      color: #FFFFFF;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 150ms linear;
      max-width: 80%;
      text-align: center;
    }
    #toast.is-visible { opacity: 1; }

    /* ---------- Misc helpers ---------- */
    .hidden { display: none !important; }
    .nowrap { white-space: nowrap; }
    .small { font-size: 12px; color: #5A5A5A; }

    /* ---------- Open rounds list on Setup (v1.5) ---------- */
    .open-rounds-block {
      border: 1px solid #2F6B3A;
      background: #EFF4EF;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .open-rounds-block .or-title {
      font-size: 13px;
      font-weight: 700;
      color: #2F6B3A;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .open-round-card {
      background: #FFFFFF;
      border: 1px solid #D8D6CF;
      border-radius: 8px;
      padding: 8px 10px;
      margin-top: 6px;
    }
    .open-round-card .or-line1 {
      display: flex;
      gap: 8px;
      align-items: baseline;
      font-variant-numeric: tabular-nums;
    }
    .open-round-card .or-date {
      font-weight: 700;
      color: #1A1A1A;
      font-size: 13px;
    }
    .open-round-card .or-course {
      font-weight: 600;
      flex: 1 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .open-round-card .or-status {

      padding: 1px 6px;
      border-radius: 3px;

      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 700;
    }
    .open-round-card .or-line2 {
      font-size: 11px;

    }
    .open-round-card .or-actions {

      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
    }
    .open-round-card .or-actions .btn {
      min-height: 40px;
      font-size: 13px;
    }

    /* ---------- History table (v1.3) ---------- */
    .history-wrap { padding: 10px 14px 14px; }
    .history-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .history-subtitle { font-size: 12px; color: #5A5A5A; margin-bottom: 10px; }
    table.history-table {
      width: 100%;
      border-collapse: collapse;
      background: #FFFFFF;
      font-size: 13px;
    }
    table.history-table thead th {
      text-align: left;
      padding: 8px 10px;
      background: #F4F2EC;
      border-bottom: 1px solid #BFBDB4;
      font-weight: 700;
      font-size: 11px;
      color: #5A5A5A;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    table.history-table tbody td {
      padding: 10px;
      border-bottom: 1px solid #D8D6CF;
      vertical-align: top;
    }
    tr.history-row { cursor: pointer; }
    tr.history-row:hover, tr.history-row:active { background: #EAF1EB; }
    tr.history-row .h-date {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      color: #1A1A1A;
    }
    tr.history-row .h-time {
      font-size: 11px;
      color: #5A5A5A;
      font-variant-numeric: tabular-nums;
    }
    tr.history-row .h-course {
      font-weight: 600;
      color: #1A1A1A;
    }
    tr.history-row .h-players {
      font-size: 11px;

      margin-top: 3px;

      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;

    .history-del {

    /* ---------- GPS & Nearby (v1.1) ---------- */
    .gps-row {
      display: flex;
      align-items: center;
      gap: 8px;

      border: 1px solid #D8D6CF;
      border-radius: 8px;

      min-height: 44px;
    }

    .gps-row .gps-text {
      flex: 1 1 auto;
      font-size: 12px;
      color: #1A1A1A;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    .gps-bars { display: inline-flex; align-items: flex-end; gap: 2px; height: 18px; }

      width: 100%;

      justify-content: space-between;
      gap: 8px;
      align-items: baseline;

    .nearby-item .ni-dist {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #2F6B3A;
      font-size: 13px;
    }
    .nearby-item .ni-name {
      font-weight: 600;
      flex: 1 1 auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nearby-item .ni-meta { font-size: 12px; color: #5A5A5A; }

    .filter-bar {

    .filter-bar .filter-row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .filter-bar input[type="text"],
    .filter-bar select {
      width: 100%;
      min-height: 40px;
      padding: 6px 8px;
      border: 1px solid #D8D6CF;

    .course-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 10px;
      border: 1px solid #D8D6CF;
      border-radius: 8px;

    .region-group { margin-top: 8px; }
    .region-group .rg-title {
      font-size: 12px;
      font-weight: 600;
      color: #5A5A5A;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .region-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid #D8D6CF;
      border-radius: 8px;

  <script>
  (function () {
    'use strict';

    // ============================================================
    // Constants & sample data
    // ============================================================
    const STORAGE_KEY = 'golfScorecardAppStateV1';
    const SCHEMA_VERSION = 1;
    const COURSE_DB_SCHEMA_VERSION = 1;

    // Known regions: display grouping for UI filters + region import section
    const KNOWN_REGIONS = {
      europe: {
        label: 'Europa',

      }
    };
    function allKnownRegionItems() {
      const a = [];
      Object.keys(KNOWN_REGIONS).forEach(function (k) {
        KNOWN_REGIONS[k].items.forEach(function (r) { a.push(r); });
      });

    }

    const TEE_LABELS = {
      white:  'Weiss',

    };
    const TEE_ORDER = ['black', 'white', 'yellow', 'blue', 'red'];

    function uid(prefix) {
      return prefix + '-' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
    }

    // Sample courses (V1 seed)
    function buildSampleCourses() {

          ],
